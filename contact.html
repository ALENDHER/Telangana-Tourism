<!DOCTYPE html>
<html lang="en">

<head>
    <title>Contact Us</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #eef7f7;
        }


        header {
            background: #4db6ac;
            color: white;
            padding: 20px;
            text-align: center;
            justify-content: center;
        }

        nav {
            background: black;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 15px;
            text-decoration: none;
            font-size: 18px;
        }

        nav a:hover {

            color: tomato;

        }

        .contact-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 40px;
        }

        /* Contact Info */

        .contact-info {
            background: white;
            padding: 30px;
            width: 300px;
            box-shadow: 0 0 10px lightgray;
            border-radius: 8px;
        }

        .contact-info h2 {
            color: #4db6ac;
        }

        .contact-info p {
            margin: 15px 0;
            font-size: 16px;
        }

        /* Contact Form */

        .contact-form {
            background: white;
            padding: 30px;
            width: 400px;
            box-shadow: 0 0 10px lightgray;
            border-radius: 8px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        button {
            background: #4db6ac;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #3a9c93;
        }

        footer {
            background: #4db6ac;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

    <header>
        <h1>Contact Us</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="place.html">Places</a>
        <a href="gallery.html">Gallery</a>
        <a href="contact.html">Contact</a>
    </nav>

    <div class="contact-container">

        <div class="contact-info">

            <h2>Get In Touch</h2>

            <p>📍 Hyderabad, Telangana</p>
            <p>📞 +91 9876543210</p>
            <p>📧 tourism@gmail.com</p>

        </div>

        <div class="contact-form">

            <h2>Send Message</h2>

            <form>

                <input type="text" placeholder="Your Name">

                <input type="email" placeholder="Your Email">

                <textarea rows="5" placeholder="Your Message"></textarea>

                <button type="submit">Send</button>

            </form>

        </div>

    </div>

    <footer>
        <p>Follow us for more travel information</p>
        <p>&#169 2026</p>
    </footer>

</body>

</html>
